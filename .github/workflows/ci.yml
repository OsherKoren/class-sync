name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        # npm install instead of npm ci: lock file is generated on Windows and
        # excludes Linux-only optional native binaries (e.g. @emnapi/runtime).
        # npm install resolves those per-platform without failing the sync check.
        run: npm install --prefer-offline

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run ESLint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: class_sync_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        # npm install instead of npm ci: lock file is generated on Windows and
        # excludes Linux-only optional native binaries (e.g. @emnapi/runtime).
        # npm install resolves those per-platform without failing the sync check.
        run: npm install --prefer-offline

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Setup test database
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/class_sync_test
        run: |
          npx prisma migrate deploy

      - name: Run smoke tests
        timeout-minutes: 10
        run: npm test tests/smoke.spec.ts

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  build:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        # npm install instead of npm ci: lock file is generated on Windows and
        # excludes Linux-only optional native binaries (e.g. @emnapi/runtime).
        # npm install resolves those per-platform without failing the sync check.
        run: npm install --prefer-offline

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Next.js
        run: npm run build
        env:
          # Dummy values for build (not used at build time)
          DATABASE_URL: postgresql://dummy:dummy@localhost/dummy
          NEXTAUTH_SECRET: dummy-secret
          NEXTAUTH_URL: http://localhost:3000

  status:
    name: CI Status
    needs: [lint, test, build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check CI status
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.test.result }}" != "success" ]] || \
             [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "❌ CI failed"
            exit 1
          fi
          echo "✅ CI passed"
